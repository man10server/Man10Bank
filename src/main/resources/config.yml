# WebAPI クライアント設定
api:
  baseUrl: "http://localhost:8080"   # 例: http://localhost:8080 または https://api.example.com
  apiKey: ""                           # 必要に応じて設定（未使用なら空）
  timeout:
    requestMs: 10000                   # リクエスト全体のタイムアウト
    connectMs: 3000                    # 接続確立のタイムアウト
    socketMs: 10000                    # ソケット読み書きのタイムアウト
  retries: 2                           # 失敗時の自動リトライ回数（0で無効）

# 機能トグル（true=有効 / false=無効）。未設定時はデフォルトで全て true。
features:
  cheque: true
  transaction: true
  serverloan: true
  loan: true
  atm: true

# 電子マネー(Vault Provider)設定
# Man10Bank 自身を Vault(Economy) の Provider 化し、電子マネー残高を man10bankservice の
# user_vault で一元管理する。providerEnabled=true で登録する（段階導入/ロールバック用フラグ）。
# 注意: 競合する他の Economy Provider（EssentialsX 等）は必ず無効化すること。
#       登録の検証に失敗した場合は安全弁としてサーバーをホワイトリスト化し新規参加を遮断する。
vault:
  providerEnabled: true
  currencyNameSingular: "円"
  currencyNamePlural: "円"
