# WebAPI クライアント設定
api:
  baseUrl: "http://localhost:8080"   # 例: http://localhost:8080 または https://api.example.com
  apiKey: ""                           # 必要に応じて設定（未使用なら空）
  timeout:
    requestMs: 10000                   # リクエスト全体のタイムアウト
    connectMs: 3000                    # 接続確立のタイムアウト
    socketMs: 10000                    # ソケット読み書きのタイムアウト
  retries: 2                           # 失敗時の自動リトライ回数（0で無効）

# 機能トグル（true=有効 / false=無効）。未設定時はデフォルトで全て true。
features:
  cheque: true
  transaction: true
  serverloan: true
  loan: true
  atm: true

# 電子マネー(Vault Provider)設定
# - providerEnabled: Vault(Economy) Provider 登録の有効/無効。段階導入用トグル。
# - joinReadyDelayMillis / quitDrainTimeoutMillis: 既定値。Man10BankService の GET config 取得後はそちらを権威とする。
# - resyncIntervalMillis: オンラインプレイヤーの権威残高を再取得して Provider キャッシュを収束させる定期再同期間隔。
# - pendingThreshold: 送信待ちキューの未処理件数上限。超過で新規 Provider 書き込みを停止する。
# - serviceToleranceMillis: 最後の Man10BankService 成功確認からの許容時間。超過で書き込み健全性を DEGRADED に倒す。
vault:
  providerEnabled: true
  joinReadyDelayMillis: 3000
  quitDrainTimeoutMillis: 3000
  resyncIntervalMillis: 30000
  pendingThreshold: 100
  serviceToleranceMillis: 15000
